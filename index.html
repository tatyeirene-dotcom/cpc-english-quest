<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mysterious Island Quest</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        #game-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            max-width: 650px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #1a5f7a;
            margin-bottom: 5px;
            font-size: 28px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #progress-bar {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            height: 10px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background-color: #f39c12;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }
        #story-text {
            font-size: 19px;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
            border-left: 6px solid #f39c12;
            text-align: left;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 17px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover:not(:disabled) {
            background-color: #1abc9c;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #feedback {
            margin-top: 25px;
            font-weight: bold;
            font-size: 17px;
            min-height: 45px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .correct { 
            background-color: #d5f5e3;
            color: #27ae60;
            border: 1px solid #27ae60;
            display: block !important;
        }
        .wrong { 
            background-color: #fadbd8;
            color: #c0392b;
            border: 1px solid #c0392b;
            display: block !important;
        }
        #score-display {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            border-top: 2px dashed #bdc3c7;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🧭 Escape from The Mysterious Island</h1>
    <div class="subtitle">Level: CPC Advanced (Grammar & Vocab)</div>
    
    <div id="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div id="story-text">Loading story...</div>
    
    <div class="btn-container" id="options">
        </div>

    <div id="feedback"></div>
    <div id="score-display">Score: 0 / 15</div>
</div>

<script>
    const storyNodes = [
        {
            text: "Chapter 1: You woke up on a strange sandy beach. While you ________ through the dense jungle trying to find a path, you heard a strange noise.",
            options: [
                { text: "were wandering", correct: true },
                { text: "wandered", correct: false },
                { text: "have wandered", correct: false }
            ],
            explanation: "Excellent! We use Past Continuous ('were wandering') for a long background action that gets interrupted."
        },
        {
            text: "You followed the strange sound and found an ________ cave hidden behind some vines. It was the biggest cave you had ever seen!",
            options: [
                { text: "astonished", correct: false },
                { text: "enormous", correct: true },
                { text: "courageous", correct: false }
            ],
            explanation: "Spot on! 'Enormous' means extremely large."
        },
        {
            text: "You wanted to go inside, but it looked terrifying. You ________ entered the dark cave, stepping very carefully.",
            options: [
                { text: "eagerly", correct: false },
                { text: "reluctantly", correct: true },
                { text: "peculiarly", correct: false }
            ],
            explanation: "Correct! 'Reluctantly' means doing something unwillingly or with hesitation because you are scared."
        },
        {
            text: "Suddenly, a glowing ghost floated out of the walls! The ghost looked at you and cried, 'I ________ my golden key. I can't open my treasure chest!'",
            options: [
                { text: "lost", correct: false },
                { text: "was losing", correct: false },
                { text: "have lost", correct: true }
            ],
            explanation: "Brilliant! The ghost lost the key in the past, but the effect (the key is still missing NOW) means we must use Present Perfect ('have lost')."
        },
        {
            text: "You gave the crying ghost a shiny silver coin to make him happy. The ghost smiled, took the coin, and suddenly ________ into thin air!",
            options: [
                { text: "gazed", correct: false },
                { text: "vanished", correct: true },
                { text: "overcame", correct: false }
            ],
            explanation: "Perfect! 'Vanished' means disappeared completely and suddenly."
        },
        {
            text: "Chapter 2: After the ghost left, you walked deeper into the cave. Ten minutes later, you ________ a hidden door made of ancient wood.",
            options: [
                { text: "discovered", correct: true },
                { text: "were discovering", correct: false },
                { text: "have discovered", correct: false }
            ],
            explanation: "Great! This is a completed action in the past, so we use Past Simple ('discovered')."
        },
        {
            text: "You opened the door and saw an underground lake. The water was ________ beautifully under the light of blue crystals.",
            options: [
                { text: "shimmering", correct: true },
                { text: "gazing", correct: false },
                { text: "wandering", correct: false }
            ],
            explanation: "Correct! 'Shimmering' means shining with a soft, slightly wavering light."
        },
        {
            text: "You ________ the beautiful crystals when a giant water snake suddenly jumped out of the lake!",
            options: [
                { text: "admired", correct: false },
                { text: "were admiring", correct: true },
                { text: "have admired", correct: false }
            ],
            explanation: "Awesome! You 'were admiring' (Past Continuous) when the snake 'jumped' (Past Simple) and interrupted you!"
        },
        {
            text: "The giant snake hissed loudly. You were terrified, but you knew you needed to ________ your fear to survive.",
            options: [
                { text: "vanish", correct: false },
                { text: "overcome", correct: true },
                { text: "gaze", correct: false }
            ],
            explanation: "Spot on! To 'overcome' means to successfully control a feeling or problem."
        },
        {
            text: "Taking a deep breath, you did something very ________. You threw a rock to distract the snake and ran straight past it!",
            options: [
                { text: "peculiar", correct: false },
                { text: "astonished", correct: false },
                { text: "courageous", correct: true }
            ],
            explanation: "That's right! 'Courageous' means very brave."
        },
        {
            text: "You safely reached the other side. You remembered reading a book stating that giant snakes usually ________ during the day.",
            options: [
                { text: "sleep", correct: true },
                { text: "are sleeping", correct: false },
                { text: "slept", correct: false }
            ],
            explanation: "Correct! We use Present Simple ('sleep') to talk about facts or general habits of animals."
        },
        {
            text: "'Oh no,' you whispered. 'The snake ________ right now because of the loud noise I just made!'",
            options: [
                { text: "wakes up", correct: false },
                { text: "is waking up", correct: true },
                { text: "woke up", correct: false }
            ],
            explanation: "Brilliant! Because it is happening 'right now' at this exact moment, we use Present Continuous ('is waking up')."
        },
        {
            text: "Chapter 3: You ran away fast and stumbled into a secret treasure room. You stopped completely and ________ at the mountain of gold in front of you.",
            options: [
                { text: "gazed", correct: true },
                { text: "shimmered", correct: false },
                { text: "wandered", correct: false }
            ],
            explanation: "Perfect! To 'gaze' means to look steadily and intently, especially in admiration or surprise."
        },
        {
            text: "Sitting on top of the gold, there was a very ________ looking compass. It didn't point North; it pointed straight up to the ceiling!",
            options: [
                { text: "enormous", correct: false },
                { text: "peculiar", correct: true },
                { text: "reluctant", correct: false }
            ],
            explanation: "Awesome! 'Peculiar' means strange or unusual."
        },
        {
            text: "You grabbed the compass, and a secret elevator opened in the ceiling! 'Finally!' you shouted. 'I ________ for a way out for hours!'",
            options: [
                { text: "looked", correct: false },
                { text: "am looking", correct: false },
                { text: "have been looking", correct: true }
            ],
            explanation: "YOU DID IT! You started looking in the past, and you continued looking up until this very moment (Present Perfect Continuous)!"
        }
    ];

    let currentNodeIndex = 0;
    let score = 0;

    const storyElement = document.getElementById('story-text');
    const optionsElement = document.getElementById('options');
    const feedbackElement = document.getElementById('feedback');
    const scoreElement = document.getElementById('score-display');
    const progressFill = document.getElementById('progress-fill');

    function startGame() {
        currentNodeIndex = 0;
        score = 0;
        updateScore();
        showNode(currentNodeIndex);
    }

    function showNode(index) {
        feedbackElement.style.display = "none";
        feedbackElement.className = '';
        
        // Update progress bar
        const progressPercentage = (index / storyNodes.length) * 100;
        progressFill.style.width = `${progressPercentage}%`;
        
        if (index >= storyNodes.length) {
            progressFill.style.width = `100%`;
            let finalMessage = "";
            if(score === 15) finalMessage = "🏆 PERFECT SCORE! You are a Cambridge English Master!";
            else if(score >= 10) finalMessage = "🌟 Awesome job! You escaped the island!";
            else finalMessage = "👍 Good try! Keep practicing those tenses!";

            storyElement.innerHTML = `<div style="text-align:center;"><strong>🎉 THE END 🎉</strong><br><br>${finalMessage}<br><br>You survived the Mysterious Island using your advanced vocabulary and grammar skills.</div>`;
            optionsElement.innerHTML = `<button onclick="startGame()" style="background-color:#f39c12;">Play Again</button>`;
            return;
        }

        const node = storyNodes[index];
        storyElement.innerHTML = `<strong>Question ${index + 1} / 15:</strong><br><br>${node.text}`;
        optionsElement.innerHTML = '';

        // Shuffle options
        const shuffledOptions = [...node.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(option => {
            const button = document.createElement('button');
            button.textContent = option.text;
            button.onclick = () => selectOption(option, node.explanation);
            optionsElement.appendChild(button);
        });
    }

    function selectOption(option, explanation) {
        const buttons = optionsElement.querySelectorAll('button');
        buttons.forEach(btn => btn.disabled = true);

        feedbackElement.style.display = "block";

        if (option.correct) {
            feedbackElement.innerHTML = `✅ <strong>Correct!</strong> ${explanation}`;
            feedbackElement.className = 'correct';
            score++;
            updateScore();
        } else {
            feedbackElement.innerHTML = `❌ <strong>Not quite right!</strong><br><br><em>Tip:</em> ${explanation}`;
            feedbackElement.className = 'wrong';
        }

        // Wait a bit longer so the student can read the explanation
        setTimeout(() => {
            currentNodeIndex++;
            showNode(currentNodeIndex);
        }, 4500); // 4.5 seconds
    }

    function updateScore() {
        scoreElement.textContent = `Score: ${score} / 15`;
    }

    startGame();
</script>

</body>
</html>
